<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva de Salas &amp; Manutenção — IHC IFAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15181E; --muted:#363637; --soft:#363637; --line:#E7E9EE; --paper:#FFFFFF; --paper2:#F6F7FA;
  --indigo:#5B5BD6; --indigo-dk:#4444AE;
  --cyan:#0E9AAa; --cyan-dk:#0B7A86;
  --violet:#9333EA; --violet-dk:#7322C0;
  --amber:#E08600; --amber-dk:#B96E00;
  --red:#E5484D; --green:#23A55A; --green-dk:#1B8447;
  --r-lg:22px; --r-md:16px;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; background:#0c0f13; overflow:hidden;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--ink); }

/* ---------- Palco / escala ---------- */
#pres{ position:fixed; inset:0; }
#viewport{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
#scaler{ width:1280px; height:720px; position:relative; transform-origin:center center;
  background:var(--paper); box-shadow:0 24px 70px rgba(0,0,0,.35); overflow:hidden; }

/* ---------- Chrome (topo) ---------- */
.chrome{ position:absolute; top:0; left:0; right:0; height:62px; z-index:50;
  display:flex; align-items:center; gap:18px; padding:0 30px;
  background:linear-gradient(#fff, #fff); border-bottom:1px solid var(--line); }
.brand{ display:inline-flex; align-items:center; gap:9px; font-weight:800; font-size:14px; letter-spacing:.2px; color:var(--ink); white-space:nowrap; }
.brand .mk{ width:22px; height:22px; border-radius:7px; background:conic-gradient(from 220deg, var(--indigo), var(--violet), var(--cyan), var(--indigo)); }
.ob-bar{ flex:1; height:9px; background:var(--line); border-radius:999px; overflow:hidden; }
.ob-fill{ height:100%; width:4%; border-radius:999px;
  background:linear-gradient(90deg, var(--indigo), var(--violet)); transition:width .45s cubic-bezier(.34,1.2,.64,1); }
.ob-counter{ font-weight:800; font-size:13px; color:var(--soft); font-variant-numeric:tabular-nums; white-space:nowrap; }

/* ---------- CTA (rodapé) ---------- */
.ob-cta{ position:absolute; left:0; right:0; bottom:0; z-index:50; height:78px; padding:0 30px;
  display:flex; align-items:center; justify-content:space-between; gap:18px;
  background:#fff; border-top:1px solid var(--line); }
.foot-hint{ font-weight:600; font-size:12.5px; color:var(--soft); letter-spacing:.2px; }
.foot-hint kbd{ font-family:inherit; background:var(--paper2); border:1px solid var(--line); border-bottom-width:2px;
  border-radius:6px; padding:1px 7px; font-weight:800; font-size:11px; color:var(--muted); }
.foot-actions{ display:flex; align-items:center; gap:12px; }
.foot-back{ background:#fff; border:1.5px solid var(--line); border-bottom-width:3px; color:var(--muted);
  font-weight:800; font-size:14px; font-family:inherit; padding:10px 18px; border-radius:13px; cursor:pointer; transition:.12s; }
.foot-back:hover:not(:disabled){ background:var(--paper2); color:var(--ink); }
.foot-back:active{ transform:translateY(2px); }
.foot-back:disabled{ opacity:.35; cursor:default; }
.duo-btn{ display:inline-flex; align-items:center; gap:9px; background:var(--indigo); color:#fff;
  font-weight:800; font-size:15px; text-transform:uppercase; letter-spacing:.8px; font-family:inherit;
  padding:13px 26px; border:none; border-radius:14px; box-shadow:0 4px 0 var(--indigo-dk); cursor:pointer; min-width:190px; justify-content:center;
  transition:transform .08s, box-shadow .12s, filter .12s; }
.duo-btn:hover{ filter:brightness(1.06); transform:translateY(-1px); box-shadow:0 5px 0 var(--indigo-dk); }
.duo-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--indigo-dk); }

/* ---------- Slide ---------- */
.slide{ position:absolute; inset:0; background:#fff; display:none; flex-direction:column;
  padding:96px 64px 104px; overflow:hidden; }
.slide.active{ display:flex; animation:slideIn .34s ease both; }
@keyframes slideIn{ from{opacity:0; transform:translateX(26px);} to{opacity:1; transform:none;} }

.eyebrow{ display:inline-flex; align-items:center; gap:9px; font-weight:900; font-size:12.5px;
  letter-spacing:1.6px; text-transform:uppercase; color:var(--indigo); }
.eyebrow .dot{ width:9px; height:9px; border-radius:50%; background:var(--indigo); }
.eyebrow .star{ margin-left:8px; background:var(--amber); color:#fff; font-size:10.5px; letter-spacing:.8px;
  padding:3px 9px; border-radius:999px; }
h1.title{ font-family:'Space Grotesk',sans-serif; font-size:50px; font-weight:700; line-height:1.04; letter-spacing:-1.4px; color:var(--ink); margin-top:14px; }
h2.title{ font-family:'Space Grotesk',sans-serif; font-size:38px; font-weight:700; line-height:1.08; letter-spacing:-1px; color:var(--ink); margin-top:12px; }
.subtitle{ font-size:18.5px; color:var(--muted); font-weight:600; line-height:1.45; margin-top:14px; max-width:980px; }
.stage{ flex:1; display:flex; flex-direction:column; justify-content:center; gap:20px; min-height:0; }
.stage.top{ justify-content:flex-start; padding-top:6px; }
strong{ color:var(--indigo-dk); font-weight:800; }
a { color: inherit; }

/* topics list */
.topics{ list-style:none; display:flex; flex-direction:column; gap:13px; max-width:1000px; }
.topics li{ display:flex; gap:15px; align-items:flex-start; font-size:19px; font-weight:600; line-height:1.4; color:var(--ink); }
.topics li .mk{ flex:none; width:30px; height:30px; border-radius:9px; background:var(--paper2);
  display:grid; place-items:center; font-size:16px; margin-top:1px; }

/* cards grid */
.grid{ display:grid; gap:16px; }
.grid.c2{ grid-template-columns:1fr 1fr; } .grid.c3{ grid-template-columns:repeat(3,1fr); } .grid.c4{ grid-template-columns:repeat(4,1fr); }
.card{ background:#fff; border:1.5px solid var(--line); border-bottom-width:5px; border-radius:18px; padding:20px 22px; }
.card .ico{ font-size:28px; display:block; margin-bottom:9px; }
.card h3{ font-size:17.5px; font-weight:900; margin-bottom:5px; letter-spacing:-.2px; }
.card p{ font-size:15.5px; font-weight:600; color:var(--muted); line-height:1.4; }

/* two-column compare */
.cols{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.col{ border:1.5px solid var(--line); border-radius:20px; padding:24px 26px; background:#fff; }
.col .ch{ display:inline-flex; align-items:center; gap:10px; font-weight:900; font-size:18px; margin-bottom:14px; letter-spacing:-.2px; }
.col ul{ list-style:none; display:flex; flex-direction:column; gap:9px; }
.col li{ font-size:16px; font-weight:600; color:var(--ink); line-height:1.35; padding-left:20px; position:relative; }
.col li::before{ content:""; position:absolute; left:0; top:9px; width:8px; height:8px; border-radius:50%; }
.col.good{ border-color:#CDEBD8; background:#F4FBF6; }
.col.good .ch{ color:var(--green-dk); } .col.good li::before{ background:var(--green); }
.col.warn{ border-color:#F3D9DB; background:#FCF5F5; }
.col.warn .ch{ color:#B23036; } .col.warn li::before{ background:var(--red); }

/* casebox (destaque) */
.casebox{ border:2px solid var(--indigo); border-radius:22px; padding:26px 30px; background:linear-gradient(180deg,#fff, #FAFAFF);
  box-shadow:0 8px 0 rgba(91,91,214,.10); }
.casebox .kicker{ font-weight:900; font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--indigo); }
.casebox h3{ font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; letter-spacing:-.6px; margin:6px 0 12px; }
.casebox p{ font-size:16.5px; font-weight:600; color:var(--ink); line-height:1.5; }
.casebox .meta{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.pill{ font-size:13px; font-weight:800; padding:6px 13px; border-radius:999px; background:var(--paper2); color:var(--muted); border:1px solid var(--line); }
.pill.hot{ background:#FFF3E0; color:var(--amber-dk); border-color:#F3DFBC; }

/* timeline */
.tl{ display:flex; flex-direction:column; gap:0; max-width:1010px; }
.tl .row{ display:grid; grid-template-columns:128px 1fr; gap:20px; align-items:start; padding:11px 0; position:relative; }
.tl .row::before{ content:""; position:absolute; left:139px; top:0; bottom:0; width:2px; background:var(--line); }
.tl .row:last-child::before{ display:none; }
.tl .when{ font-weight:900; font-size:15px; color:var(--indigo-dk); text-align:right; padding-top:2px; }
.tl .what{ position:relative; padding-left:26px; font-size:17px; font-weight:600; line-height:1.4; }
.tl .what::before{ content:""; position:absolute; left:-9px; top:5px; width:14px; height:14px; border-radius:50%; background:#fff; border:3px solid var(--indigo); }
.tl .what b{ color:var(--ink); font-weight:800; }

/* stat numbers */
.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.stat{ border-radius:20px; padding:24px 24px; color:#fff; }
.stat .num{ font-family:'Space Grotesk',sans-serif; font-size:40px; font-weight:700; line-height:1; letter-spacing:-1px; }
.stat .lbl{ font-size:15px; font-weight:700; margin-top:9px; line-height:1.3; opacity:.95; }
.stat.a{ background:linear-gradient(135deg,var(--indigo),var(--violet)); }
.stat.b{ background:linear-gradient(135deg,var(--cyan),#13B0A6); }
.stat.c{ background:linear-gradient(135deg,#3B3F46,#23262C); }

/* criteria */
.crit{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.crit .item{ border:1.5px solid var(--line); border-left:5px solid var(--violet); border-radius:14px; padding:18px 20px; background:#fff; }
.crit .item .q{ font-weight:900; font-size:18px; letter-spacing:-.2px; }
.crit .item .d{ font-size:15.5px; font-weight:600; color:var(--muted); margin-top:5px; line-height:1.4; }

/* note (rodapé legal/fonte) */
.note{ margin-top:8px; font-size:14.5px; font-weight:600; color:var(--soft); display:flex; align-items:center; gap:8px; }
.note .b{ font-size:11px; font-weight:900; letter-spacing:.6px; text-transform:uppercase; background:var(--paper2); border:1px solid var(--line); color:var(--muted); padding:3px 9px; border-radius:7px; }

/* ===== lightbox ===== */
#lightbox{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:900; align-items:center; justify-content:center; }
#lightbox.open{ display:flex; }
#lightbox figure{ display:flex; flex-direction:column; align-items:center; max-width:88%; max-height:92%; }
#lightbox img{ max-width:100%; max-height:76vh; border-radius:16px; box-shadow:0 24px 80px rgba(0,0,0,.6); cursor:default; }
#lightbox-caption{ color:#C4B5FD; font-size:14px; font-weight:600; margin-top:12px; text-align:center; max-width:680px; line-height:1.5; min-height:1em; }
#lightbox-dots{ display:none; gap:8px; margin-top:10px; }
#lightbox-dots.show{ display:flex; }
#lightbox-dots span{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; transition:background .15s; }
#lightbox-dots span.active{ background:#fff; }
#lightbox-close,#lightbox-prev,#lightbox-next{ position:absolute; color:#fff; font-weight:900; cursor:pointer; background:rgba(255,255,255,.15); border:none; border-radius:50%; display:grid; place-items:center; transition:background .15s; }
#lightbox-close:hover,#lightbox-prev:hover,#lightbox-next:hover{ background:rgba(255,255,255,.28); }
#lightbox-close{ top:20px; right:24px; font-size:24px; width:44px; height:44px; }
#lightbox-prev,#lightbox-next{ top:50%; transform:translateY(-50%); font-size:30px; width:52px; height:52px; display:none; }
#lightbox-prev{ left:20px; }
#lightbox-next{ right:20px; }
#lightbox-prev.show,#lightbox-next.show{ display:grid; }
/* gallery thumbnails */
.img-gallery{ display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; align-items:flex-start; }
.img-thumb{ display:inline-flex; flex-direction:column; align-items:center; gap:5px; }
.img-thumb img.img-trigger{ width:160px; height:100px; object-fit:cover; border-radius:10px; border:1.5px solid var(--line); cursor:zoom-in; transition:box-shadow .15s,transform .15s,border-color .15s; }
.img-thumb img.img-trigger:hover{ box-shadow:0 4px 14px rgba(0,0,0,.18); transform:scale(1.04); border-color:var(--indigo); }
.img-thumb figcaption{ font-size:11px; font-weight:700; color:var(--muted); text-align:center; line-height:1.4; max-width:160px; }

/* ===== tooltip ===== */
.tip{ position:relative; cursor:help; text-decoration:underline dotted; text-underline-offset:3px; }
.tip::before,.tip::after{ pointer-events:none; opacity:0; transition:opacity .15s; z-index:200; }
.tip::before{ content:attr(data-tip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
  background:#1C1740; color:#EDE9FB; font-size:13px; font-weight:600; line-height:1.45;
  padding:8px 14px; border-radius:10px; max-width:280px; width:max-content; white-space:normal;
  box-shadow:0 4px 16px rgba(0,0,0,.22); }
.tip::after{ content:""; position:absolute; bottom:calc(100% + 2px); left:50%; transform:translateX(-50%);
  border:6px solid transparent; border-top-color:#1C1740; }
.tip:hover::before,.tip:hover::after,.tip.open::before,.tip.open::after{ opacity:1; }

/* ===== cover ===== */
.slide.cover{ padding:0; }
.cover-wrap{ flex:1; display:grid; grid-template-columns:1.15fr .85fr; }
.cover-l{ padding:74px 56px; display:flex; flex-direction:column; justify-content:center;
  background:radial-gradient(120% 120% at 0% 0%, #1A1340 0%, #221A52 40%, #2A1170 100%); color:#fff; position:relative; overflow:hidden; }
.cover-l::after{ content:""; position:absolute; right:-120px; bottom:-120px; width:380px; height:380px; border-radius:50%;
  background:radial-gradient(circle, rgba(147,51,234,.55), transparent 70%); filter:blur(8px); }
.cover-tag{ font-weight:900; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:#C4B5FD; }
.cover-l h1{ font-family:'Space Grotesk',sans-serif; font-size:58px; font-weight:700; line-height:1; letter-spacing:-2px; margin:18px 0 16px; }
.cover-hook{ font-size:20px; font-weight:600; color:#E9E4FF; line-height:1.45; max-width:520px; position:relative; z-index:1; }
.cover-meta{ margin-top:30px; font-size:14.5px; font-weight:700; color:#C6BEEF; position:relative; z-index:1; }
.cover-r{ padding:64px 48px; display:flex; flex-direction:column; justify-content:center; background:var(--paper2); }
.cover-r .who{ font-weight:900; font-size:12.5px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
.team{ display:flex; flex-direction:column; gap:10px; }
.member{ display:flex; align-items:center; gap:14px; background:#fff; border:1.5px solid var(--line); border-bottom-width:4px; border-radius:14px; padding:12px 16px; }
.member .ava{ width:38px; height:38px; border-radius:11px; flex:none; display:grid; place-items:center; color:#fff; font-weight:900; font-size:15px; }
.member .nm{ font-weight:700; font-size:15.5px; letter-spacing:-.2px; }

/* ===== agenda ===== */
.qcards{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.qcard{ border-radius:20px; padding:26px 24px; color:#fff; }
.qcard .q{ font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:700; letter-spacing:-.8px; }
.qcard .d{ font-size:15.5px; font-weight:600; margin-top:8px; opacity:.95; line-height:1.35; }
.qcard.q1{ background:linear-gradient(135deg,var(--indigo),var(--indigo-dk)); }
.qcard.q2{ background:linear-gradient(135deg,var(--cyan),var(--cyan-dk)); }
.qcard.q3{ background:linear-gradient(135deg,var(--violet),var(--violet-dk)); }
.path{ display:flex; align-items:center; gap:12px; margin-top:22px; flex-wrap:wrap; }
.path .p{ font-weight:800; font-size:15px; padding:10px 18px; border-radius:12px; background:var(--paper2); border:1.5px solid var(--line); }
.path .arr{ color:var(--soft); font-weight:900; }

/* block accents */
.blk-dir .eyebrow, .blk-dir .eyebrow .dot{ color:var(--indigo); background-color:transparent; }
.blk-dir .eyebrow .dot{ background:var(--indigo); }
.blk-game .eyebrow{ color:var(--cyan-dk); } .blk-game .eyebrow .dot{ background:var(--cyan); }
.blk-ia .eyebrow{ color:var(--violet-dk); } .blk-ia .eyebrow .dot{ background:var(--violet); }
.blk-end .eyebrow{ color:var(--green-dk); } .blk-end .eyebrow .dot{ background:var(--green); }
.blk-game .casebox{ border-color:var(--cyan); box-shadow:0 8px 0 rgba(14,154,170,.12); }
.blk-game .casebox .kicker, .blk-game .tl .when{ color:var(--cyan-dk); }
.blk-game .tl .what::before{ border-color:var(--cyan); }
.blk-ia .casebox{ border-color:var(--violet); box-shadow:0 8px 0 rgba(147,51,234,.12); }
.blk-ia .casebox .kicker, .blk-ia .tl .when{ color:var(--violet-dk); }
.blk-ia .tl .what::before{ border-color:var(--violet); }

/* ===== TOC ===== */
.toc-toggle{ position:absolute; top:13px; right:0; z-index:60; display:none; }
.toc-panel{ position:absolute; inset:0; z-index:70; background:rgba(15,12,30,.55); backdrop-filter:blur(3px);
  display:none; align-items:stretch; }
.toc-panel.open{ display:flex; }
.toc-inner{ width:430px; max-width:80%; background:#fff; height:100%; padding:30px 24px; overflow:auto; box-shadow:8px 0 40px rgba(0,0,0,.3); }
.toc-head{ font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; letter-spacing:-.5px; margin-bottom:16px; }
#toc-list{ list-style:none; }
.toc-item{ display:flex; gap:12px; align-items:center; padding:10px 12px; border-radius:11px; cursor:pointer; font-weight:700; font-size:15px; color:var(--ink); }
.toc-item:hover{ background:var(--paper2); }
.toc-item.current{ background:#EEEBFF; color:var(--indigo-dk); }
.toc-num{ font-weight:900; font-size:12px; color:var(--soft); font-variant-numeric:tabular-nums; width:22px; }
.toc-item.current .toc-num{ color:var(--indigo); }

/* ===== presenter notes ===== */
.notes-bar{ position:absolute; left:0; right:0; bottom:78px; z-index:45; background:#15131F; color:#EDE9FB;
  padding:14px 30px; font-size:14.5px; line-height:1.45; font-weight:500; display:none; border-top:2px solid var(--violet); }
.notes-bar.show{ display:block; }
.notes-bar b{ color:#C4B5FD; }

/* ===== tri-table (slides 04–06) ===== */
.tri{display:flex;flex-direction:column;gap:9px;margin-top:10px}
.tri-hdr{display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:10px;margin-bottom:2px}
.tri-hdr span{font-size:11px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;padding:0 2px}
.tri-row{display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:10px;align-items:start}
.tc{border-radius:13px;padding:12px 15px;font-size:14.5px;font-weight:600;line-height:1.4}
.tc.pos{background:#F4FBF6;border:1.5px solid #CDEBD8;color:#1B5E38}
.tc.neg{background:#FCF5F5;border:1.5px solid #F3D9DB;color:#8B2222}
.tc.sol{background:#FAFAFF;border:1.5px solid var(--indigo);color:var(--ink)}
.tc.sol.risk{background:#FCF5F5;border-color:var(--red);color:#8B2222}
/* ===== feature list (slide 13) ===== */
.flist{list-style:none;display:flex;flex-direction:column;gap:5px;margin-top:8px}
.flist li{font-size:14.5px;font-weight:600;color:var(--muted);display:flex;gap:7px;line-height:1.35;align-items:flex-start}
.flist li span.dot{color:var(--green);flex-shrink:0;font-size:16px;line-height:1}
/* ===== demo (slides 14–15) ===== */
.demo-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:24px}
.demo-icon{font-size:80px;line-height:1}
.demo-pills{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:8px}
.demo-pill{font-size:14px;font-weight:800;padding:10px 20px;border-radius:14px;background:#F4FBF6;border:2px solid #CDEBD8;color:var(--green-dk);letter-spacing:.2px}
.demo-hd{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-shrink:0}
.demo-hd .title{font-size:22px;margin:0;color:var(--green-dk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.demo-iframe{flex:1;min-height:0;width:100%;border:none;border-radius:10px;box-shadow:0 2px 20px rgba(0,0,0,.18)}
/* ===== encerramento (slide 16) ===== */
.fim-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px}
.fim-team{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:6px}
.fim-tag{font-size:16px;font-weight:700;padding:9px 18px;border-radius:12px;background:var(--paper2);color:var(--muted);letter-spacing:.1px}

/* ===== IMPRESSÃO ===== */
@media print {
  /* Página A4 paisagem sem margens — slides preenchem inteiro */
  @page { size: A4 landscape; margin: 0; }

  /* Garante impressão fiel de cores e fundos */
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Reseta o layout de tela cheia */
  html, body { height: auto; overflow: visible; background: #fff; }
  #pres  { position: static; height: auto; }
  #viewport { position: static; display: block; height: auto; }

  /* Remove o transform do JS e escala 1280px → ~1122px (A4 landscape @ 96dpi) */
  #scaler {
    position: static;
    transform: none !important;
    box-shadow: none;
    overflow: visible;
    zoom: 0.877;
  }

  #slides-host { position: static; }

  /* Esconde elementos de navegação */
  .chrome, .ob-cta, .notes-bar, .toc-panel, .toc-toggle, #lightbox {
    display: none !important;
  }

  /* Cada slide vira um bloco no fluxo do documento */
  .slide {
    position: relative !important;
    display: flex !important;
    inset: auto !important;
    animation: none !important;
    height: auto;
    min-height: 720px;   /* slides normais ficam na altura do design */
    break-after: page;
    page-break-after: always;
    overflow: visible !important;
  }

  .slide:last-child { break-after: auto; page-break-after: auto; }

  /* Libera conteúdo oculto por scroll (slide 12 — user stories) */
  div[style*="overflow-y:auto"] {
    overflow: visible !important;
    height: auto !important;
    flex: none !important;
    min-height: 0 !important;
  }
}
</style>
</head>
<body>
<div id="pres">
<div id="viewport">
<div id="scaler">

  <!-- CHROME -->
  <div class="chrome">
    <span class="brand"><span class="mk"></span> Reserva de Salas · IHC IFAL</span>
    <div class="ob-bar"><div class="ob-fill" id="ob-fill"></div></div>
    <span class="ob-counter" id="counter">1 / —</span>
  </div>

  <!-- slides injetados aqui -->
  <div id="slides-host"></div>

  <!-- CTA -->
  <div class="ob-cta" id="ob-cta-wrap">
    <span class="foot-hint"><kbd>←</kbd> <kbd>→</kbd> navegar · <kbd>T</kbd> sumário · <kbd>N</kbd> notas · <kbd>F</kbd> tela cheia</span>
    <div class="foot-actions">
      <button class="foot-back" id="ob-back">‹ Voltar</button>
      <button class="duo-btn" id="ob-cta">Continuar</button>
    </div>
  </div>

  <!-- presenter notes -->
  <div class="notes-bar" id="notes-bar"></div>

  <!-- TOC -->
  <button class="foot-back toc-toggle" id="toc-toggle">☰ Sumário</button>
  <aside class="toc-panel" id="toc-panel">
    <div class="toc-inner">
      <div class="toc-head">Sumário</div>
      <ol id="toc-list"></ol>
    </div>
  </aside>

</div>
</div>
</div>

<script>
(async function(){
  'use strict';

  const SLIDE_FILES = [
    'slides/01-capa.html',
    'slides/02-agenda.html',
    'slides/03-triangulo-intro.html',
    'slides/04-triangulo-ux.html',
    'slides/05-triangulo-dev.html',
    'slides/06-triangulo-pm.html',
    'slides/07-personas-overview.html',
    'slides/08-persona-marcos.html',
    'slides/09-persona-camila.html',
    'slides/10-persona-roberta.html',
    'slides/11-persona-carlos.html',
    'slides/12-user-stories.html',
    'slides/13-funcionalidades.html',
    'slides/14-demo.html',
    'slides/15-demo-figma.html',
    'slides/16-fim.html',
  ];

  const host = document.getElementById('slides-host');
  const htmls = await Promise.all(SLIDE_FILES.map(f => fetch(f).then(r => r.text())));
  htmls.forEach(html => {
    const tmp = document.createElement('div');
    tmp.innerHTML = html.trim();
    host.appendChild(tmp.firstElementChild);
  });

  const scaler  = document.getElementById('scaler');
  const slides  = Array.from(document.querySelectorAll('.slide'));
  const counter = document.getElementById('counter');
  const fill    = document.getElementById('ob-fill');
  const back    = document.getElementById('ob-back');
  const cta     = document.getElementById('ob-cta');
  const tocPanel= document.getElementById('toc-panel');
  const tocList = document.getElementById('toc-list');
  const notesBar= document.getElementById('notes-bar');
  const W=1280, H=720;
  let index=0, step=0, notesOn=false;

  function fit(){ const s=Math.min(window.innerWidth/W, window.innerHeight/H); scaler.style.transform='scale('+s+')'; }
  window.addEventListener('resize', fit);

  const stepsOf = i => Array.from(slides[i].querySelectorAll('.step'));

  function render(){
    slides.forEach((sl,i)=> sl.classList.toggle('active', i===index));
    stepsOf(index).forEach((el,k)=> el.classList.toggle('show', k<step));
    counter.textContent = (index+1)+' / '+slides.length;
    fill.style.width = ((index+1)/slides.length*100)+'%';
    back.disabled = (index===0 && step===0);
    const label = slides[index].dataset.cta;
    cta.textContent = (label && label!=='') ? label : 'Continuar';
    Array.from(tocList.children).forEach(li=> li.classList.toggle('current', +li.dataset.goto===index));
    notesBar.innerHTML = '<b>Nota:</b> ' + (slides[index].dataset.notes || '—');
    notesBar.classList.toggle('show', notesOn);
    location.replace('#'+(index+1));
  }
  function next(){ const st=stepsOf(index); if(step<st.length){step++;return render();} if(index<slides.length-1){index++;step=0;render();} }
  function prev(){ if(step>0){step--;return render();} if(index>0){index--;step=stepsOf(index).length;render();} }
  function goto(i){ index=Math.max(0,Math.min(slides.length-1,i)); step=0; render(); tocPanel.classList.remove('open'); }

  function buildToc(){
    slides.forEach((sl,i)=>{
      const t = sl.dataset.title || ('Slide '+(i+1));
      const li=document.createElement('li');
      li.className='toc-item'; li.dataset.goto=i;
      li.innerHTML='<span class="toc-num">'+String(i+1).padStart(2,'0')+'</span><span>'+t+'</span>';
      li.addEventListener('click', ()=>goto(i));
      tocList.appendChild(li);
    });
  }
  const toggleToc = ()=> tocPanel.classList.toggle('open');

  window.addEventListener('keydown', e=>{
    switch(e.key){
      case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
      case 'ArrowLeft': case 'PageUp': e.preventDefault(); prev(); break;
      case 'Home': goto(0); break;
      case 'End': goto(slides.length-1); break;
      case 't': case 'T': toggleToc(); break;
      case 'n': case 'N': notesOn=!notesOn; render(); break;
      case 'Escape': tocPanel.classList.remove('open'); break;
      case 'f': case 'F':
        if(!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
        break;
    }
  });
  cta.addEventListener('click', next);
  back.addEventListener('click', prev);
  document.getElementById('toc-toggle').addEventListener('click', toggleToc);
  tocPanel.addEventListener('click', e=>{ if(e.target===tocPanel) tocPanel.classList.remove('open'); });

  let tx=0;
  window.addEventListener('touchstart', e=> tx=e.changedTouches[0].clientX, {passive:true});
  window.addEventListener('touchend', e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50)(dx<0?next():prev()); }, {passive:true});

  const lb=document.getElementById('lightbox');
  const lbImg=document.getElementById('lightbox-img');
  const lbCaption=document.getElementById('lightbox-caption');
  const lbDots=document.getElementById('lightbox-dots');
  const lbPrev=document.getElementById('lightbox-prev');
  const lbNext=document.getElementById('lightbox-next');
  let lbGallery=[],lbIdx=0;
  function lbRender(){
    const t=lbGallery[lbIdx];
    lbImg.src=t.dataset.src||t.src; lbImg.alt=t.dataset.alt||'';
    lbCaption.textContent=t.dataset.caption||'';
    const multi=lbGallery.length>1;
    lbPrev.classList.toggle('show',multi); lbNext.classList.toggle('show',multi);
    if(lbGallery.length>3){
      lbDots.classList.add('show');
      lbDots.innerHTML=lbGallery.map((_,i)=>`<span data-i="${i}" class="${i===lbIdx?'active':''}"></span>`).join('');
    } else { lbDots.classList.remove('show'); lbDots.innerHTML=''; }
  }
  function lbOpen(triggers,idx){ lbGallery=[...triggers]; lbIdx=idx; lbRender(); lb.classList.add('open'); }
  function lbClose(){ lb.classList.remove('open'); }
  document.getElementById('lightbox-close').addEventListener('click', e=>{ lbClose(); e.stopPropagation(); });
  lbPrev.addEventListener('click', e=>{ lbIdx=(lbIdx-1+lbGallery.length)%lbGallery.length; lbRender(); e.stopPropagation(); });
  lbNext.addEventListener('click', e=>{ lbIdx=(lbIdx+1)%lbGallery.length; lbRender(); e.stopPropagation(); });
  lbDots.addEventListener('click', e=>{ const s=e.target.closest('[data-i]'); if(s){lbIdx=+s.dataset.i; lbRender();} e.stopPropagation(); });
  lb.addEventListener('click', e=>{ if(e.target===lb) lbClose(); });
  document.addEventListener('keydown', e=>{
    if(!lb.classList.contains('open')) return;
    if(e.key==='Escape') lbClose();
    if(e.key==='ArrowLeft'&&lbGallery.length>1){ lbIdx=(lbIdx-1+lbGallery.length)%lbGallery.length; lbRender(); }
    if(e.key==='ArrowRight'&&lbGallery.length>1){ lbIdx=(lbIdx+1)%lbGallery.length; lbRender(); }
  });
  document.addEventListener('click', e=>{
    const trigger=e.target.closest('.img-trigger');
    if(trigger){
      const gallery=trigger.closest('.img-gallery');
      const all=gallery?[...gallery.querySelectorAll('.img-trigger')]:[trigger];
      lbOpen(all,all.indexOf(trigger)); e.stopPropagation(); return;
    }
    const t=e.target.closest('.tip');
    if(t){ t.classList.toggle('open'); e.stopPropagation(); }
    else document.querySelectorAll('.tip.open').forEach(t=>t.classList.remove('open'));
  });

  buildToc(); fit();
  const hash=parseInt(location.hash.replace('#',''),10);
  if(hash && hash>=1 && hash<=slides.length) index=hash-1;
  render();
})();
</script>
<div id="lightbox"><button id="lightbox-close">×</button><button id="lightbox-prev">&#8249;</button><button id="lightbox-next">&#8250;</button><figure><img id="lightbox-img" src="" alt=""><figcaption id="lightbox-caption"></figcaption><div id="lightbox-dots"></div></figure></div>
</body>
</html>
